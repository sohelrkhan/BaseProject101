<div class="page-wrapper d-flex flex-column justify-content-between">
  <div class="content flex-fill">
    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
      <div class="my-auto mb-2">
        <h2 class="mb-1">Income Management</h2>
        <nav>
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
              <a href="index.html">
                <i class="ti ti-smart-home me-1"></i>
                Dashboard
              </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">
              Income Categories
            </li>
          </ol>
        </nav>
      </div>
      <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
        <div class="mb-2" *appCheckPermission="{ feature: 'Income Category', action: 'Create' }">
          <a class="btn btn-primary d-flex align-items-center" routerLink="/app/income-category/create">
            <i class="ti ti-circle-plus me-2"></i>
            Add Income Category
          </a>
        </div>
        <div class="ms-2 head-icons">
          <a href="javascript:void(0);" class data-bs-toggle="tooltip" data-bs-placement="top" data-bs-original-title="Collapse" id="collapse-header">
            <i class="ti ti-chevrons-up"></i>
          </a>
        </div>
      </div>
    </div>
    <app-income-category-list *ngIf="showListComponent"></app-income-category-list>
  </div>
</div>
<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-spin" [fullScreen]="true">
  <p style="color: white">Loading...</p>
</ngx-spinner>
