<div class="page-wrapper vh-100 d-flex flex-column justify-content-between">
  <div class="content flex-fill h-100">
    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
      <div class="my-auto mb-2">
        <h2 class="mb-1">Administration</h2>
        <nav>
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
              <a href><i class="ti ti-smart-home"></i></a>
            </li>
            <li class="breadcrumb-item"><a>Access Control</a></li>
            <li class="breadcrumb-item"><a routerLink="/app/actions">Action Control</a></li>
            <li class="breadcrumb-item"><a routerLink="/app/actions">Action List</a></li>
            <li class="breadcrumb-item active" aria-current="page">Update Action</li>
          </ol>
        </nav>
      </div>
    </div>
    <div class="row justify-content-center align-content-center mt-3">
      <div class="col-md-12">
        <div class="card shadow-lg">
          <div class="card-header bg-primary text-white d-flex align-items-center">
            <i class="fas fa-plus me-2"></i>
            <h5 class="mb-0 text-white">Update User Action</h5>
          </div>
          <div class="card-body">
            <form class="row g-3" autocomplete="off">
              <div class="col-md-3">
                <label for="name" class="form-label">Name <span class="text-danger fw-bold">*</span></label>
                <input type="text" id="name" name="name" [(ngModel)]="actionUpdateModel.name" class="form-control" />
              </div>
              <div class="col-md-3">
                <label class="form-label" for="statusId">Status <span class="text-danger fw-bold">*</span></label>
                <select class="js-example-placeholder-multiple select2" id="statusId">
                  <option *ngFor="let status of statuses" [value]="status.id"> {{ status.name }} </option>
                </select>
              </div>
            </form>
          </div>
          <div class="card-footer">
            <div class="col-12">
              <div class="modal-footer">
                <button type="button" routerLink="/app/actions" class="btn btn-light me-2">
                  <i class="ti ti-arrow-back-up me-1"></i>
                  Back
                </button>
                <button type="button" (click)="onClickUpdateAction()" class="btn btn-primary">
                  <i class="ti ti-device-floppy me-1"></i>
                  Update
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="square-jelly-box"[fullScreen]="true">
  <p style="color: white">Loading...</p>
</ngx-spinner>
