<!-- Page Wrapper -->
<div class="page-wrapper d-flex flex-column justify-content-between">
  <div class="content flex-fill">
    <!-- Breadcrumb -->
    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
      <div class="my-auto mb-2">
        <h2 class="mb-1">Administration</h2>
        <nav>
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
              <a href="index.html">
                <i class="ti ti-smart-home me-1"></i>
              </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Configurations</li>
            <li class="breadcrumb-item active" aria-current="page" routerLink="/app/modules">Module List</li>
          </ol>
        </nav>
      </div>
      <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
        <div class="mb-2">
          <a
            routerLink="/app/module/create"
            class="btn btn-primary d-flex align-items-center"
            *appCheckPermission="{ feature: 'Module', action: 'Create' }">
            <i class="ti ti-circle-plus me-2"></i>
            Add Module
          </a>
        </div>
        <div class="ms-2 head-icons">
          <a
            href="javascript:void(0);"
            class
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            data-bs-original-title="Collapse"
            id="collapse-header">
            <i class="ti ti-chevrons-up"></i>
          </a>
        </div>
      </div>
    </div>
    <!-- /Breadcrumb -->

    <div class="row justify-content-center align-items-center mt-3">
      <div class="card">
        <div
          class="card-header d-flex align-items-center justify-content-between flex-wrap row-gap-3">
          <h5>Module List</h5>
        </div>

        <div class="card-body p-0">
           <div class="custom-datatable-filter table-responsive p-3" *ngIf="isTableReady">
            <table id="example" class="table table-bordered" *ngIf="isBrowser">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Code</th>
                  <th class="text-center">Status</th>
                  <th class="text-center">Actions</th>
                </tr>
              </thead>
              <tbody>
                <ng-container *ngIf="modules?.length > 0; else noDataTemplate">
                  <tr *ngFor="let module of modules">
                    <td>{{ module.name }}</td>
                    <td>{{ module.code }}</td>
                    <td class="text-center">
                      <span *ngIf="module.statusId == 1" class="badge bg-success m-1">{{ module.statusName }}</span>
                      <span *ngIf="module.statusId == 2" class="badge bg-danger m-1">{{ module.statusName }}</span>
                    </td>
                    <td>
                      <div class="hstack gap-2 fs-15 align-content-center justify-content-center">
                        <a
                          class="btn btn-icon btn-sm btn-info rounded-pill"
                          routerLink="/app/module/update/{{ module.encryptedId }}"
                          *appCheckPermission="{ feature: 'Module', action: 'Update' }">
                          <i class="feather-edit"></i>
                        </a>

                        <a
                          class="btn btn-icon btn-sm btn-danger rounded-pill" data-bs-toggle="modal" data-bs-target="#delete_modal"
                          (click)="onClickOpenDeleteModal(module.id)"
                          *appCheckPermission="{ feature: 'Module', action: 'Delete' }">
                          <i class="feather-trash"></i>
                        </a>
                      </div>
                    </td>
                  </tr>
                </ng-container>
              </tbody>
            </table>

            <ng-template #noDataTemplate>
              <tr>
                <td colspan="8" class="text-center text-muted">No data available</td>
              </tr>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Delete Modal -->
<div class="modal fade" id="delete_modal">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-body text-center">
        <span class="avatar avatar-xl bg-transparent-danger text-danger mb-3">
          <i class="ti ti-trash-x fs-36"></i>
        </span>
        <h4 class="mb-1">Confirm Delete</h4>
        <div class="d-flex justify-content-center mt-3">
          <a href="javascript:void(0);" class="btn btn-light me-3" data-bs-dismiss="modal">
            Cancel
          </a>
          <a class="btn btn-danger" (click)="onClickDeleteModule()" *appCheckPermission="{ feature: 'Module', action: 'Delete' }" data-bs-dismiss="modal">Yes, Delete</a>
        </div>
      </div>
    </div>
  </div>
</div>

<ngx-spinner
  bdColor="rgba(0, 0, 0, 0.8)"
  size="medium"
  color="#fff"
  type="ball-spin"
  [fullScreen]="true">
  <p style="color: white">Loading...</p>
</ngx-spinner>
