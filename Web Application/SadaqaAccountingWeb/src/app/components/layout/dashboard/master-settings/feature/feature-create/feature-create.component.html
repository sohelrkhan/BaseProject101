<div class="page-wrapper vh-100 d-flex flex-column justify-content-between">
  <div class="content flex-fill h-100">
    <!-- Breadcrumb -->
    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
      <div class="my-auto mb-2">
        <h2 class="mb-1">Master Settings</h2>
        <nav>
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
              <a href><i class="ti ti-smart-home"></i></a>
            </li>
            <li routerLink="/app/features" class="breadcrumb-item">Features</li>
            <li class="breadcrumb-item active" aria-current="page">Create Feature</li>
          </ol>
        </nav>
      </div>
    </div>
    <!-- /Breadcrumb -->
    <div class="row justify-content-center align-content-center mt-3">
      <div class="col-md-12">
        <div class="card shadow-lg">
          <div class="card-header bg-primary text-white d-flex align-items-center">
            <i class="fas fa-cogs me-2"></i>
            <h5 class="mb-0 text-white">Create Feature</h5>
          </div>
          <div class="card-body">
            <form class="row g-3" autocomplete="off">
              <div class="col-md-4">
                <label for="code" class="form-label">
                  Code
                  <span class="text-danger fw-bold">*</span>
                </label>
                <input type="text" id="code" name="code" [(ngModel)]="featureCreateModel.code" class="form-control"
                  placeholder="Ex: CD1001" />
              </div>
              <div class="col-md-4">
                <label for="name" class="form-label">
                  Name
                  <span class="text-danger fw-bold">*</span>
                </label>
                <input type="text" id="name" name="name" [(ngModel)]="featureCreateModel.name" class="form-control"
                  placeholder="Enter feature name" />
              </div>
              <div class="col-md-4">
                <label for="moduleId" class="form-label">
                  Module
                  <span class="text-danger fw-bold">*</span>
                </label>
                <select #moduleSelect id="moduleId" name="moduleId" [(ngModel)]="featureCreateModel.moduleId" class="form-select">
                  <option [value]="-1">Choose...</option>
                  <option *ngFor="let module of modules" [value]="module.id">
                    {{ module.name }}
                  </option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="linkedTableName" class="form-label">
                  Linked Table Name
                  <span class="text-danger fw-bold">*</span>
                </label>
                <input type="text" id="linkedTableName" name="linkedTableName"
                  [(ngModel)]="featureCreateModel.linkedTableName" class="form-control"
                  placeholder="Enter table name" />
              </div>
              <div class="col-md-4">
                <label for="linkedControllerName" class="form-label">Linked Controller Name</label>
                <input type="text" id="linkedControllerName" name="linkedControllerName"
                  [(ngModel)]="featureCreateModel.linkedControllerName" class="form-control"
                  placeholder="Enter controller name" />
              </div>
            </form>
          </div>
          <div class="card-footer">
            <div class="col-12">
              <div class="modal-footer">
                <button type="button" class="btn btn-light me-2" (click)="onClickBack()">
                  <i class="ti ti-arrow-back-up me-1"></i>
                  Back
                </button>
                <button type="button" (click)="onClickCreateFeature()" class="btn btn-primary"
                  *appCheckPermission="{ feature: 'Feature', action: 'Create' }">
                  <i class="ti ti-device-floppy me-1"></i>
                  Create
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-spin" [fullScreen]="true">
  <p style="color: white">Loading...</p>
</ngx-spinner>
