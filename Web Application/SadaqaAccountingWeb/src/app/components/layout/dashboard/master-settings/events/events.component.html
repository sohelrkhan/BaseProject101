<!-- Page Wrapper -->
<div class="page-wrapper d-flex flex-column justify-content-between">
  <div class="content flex-fill">
    <!-- Breadcrumb -->
    <div
      class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3"
    >
      <div class="my-auto mb-2">
        <h2 class="mb-1">Administration</h2>
        <nav>
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
              <a href="index.html">
                <i class="ti ti-smart-home me-1"></i>
                Configurations
              </a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">Events</li>
          </ol>
        </nav>
      </div>
      <div class="d-flex my-xl-auto right-content align-items-center flex-wrap">
        <div
          class="mb-2"
          *appCheckPermission="{ feature: 'Event', action: 'Create' }"
        >
          <a
            class="btn btn-primary d-flex align-items-center"
            data-bs-toggle="modal"
            data-bs-target="#add_event_modal"
            class="btn btn-primary d-flex align-items-center"
          >
            <i class="ti ti-circle-plus me-2"></i>
            Create Event
          </a>
        </div>
        <div class="ms-2 head-icons">
          <a
            href="javascript:void(0);"
            class
            data-bs-toggle="tooltip"
            data-bs-placement="top"
            data-bs-original-title="Collapse"
            id="collapse-header"
          >
            <i class="ti ti-chevrons-up"></i>
          </a>
        </div>
      </div>
    </div>
    <!-- /Breadcrumb -->

    <!-- Event list component -->
    <app-events-list *ngIf="showListComponent"></app-events-list>
  </div>
</div>

<!-- Add Event-->
<div class="modal fade" id="add_event_modal">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Add Event</h4>
        <button
          type="button"
          class="btn-close custom-btn-close"
          data-bs-dismiss="modal"
          *appCheckPermission="{ feature: 'Event', action: 'Create' }"
          aria-label="Close"
        >
          <i class="ti ti-x"></i>
        </button>
      </div>
      <!-- Event create component -->
      <app-events-create (eventCreated)="onEventCreated()"></app-events-create>
    </div>
  </div>
</div>

<ngx-spinner
  bdColor="rgba(0, 0, 0, 0.8)"
  size="medium"
  color="#fff"
  type="ball-spin"
  [fullScreen]="true"
>
  <p style="color: white">Loading...</p>
</ngx-spinner>
