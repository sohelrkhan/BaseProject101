<div class="page-wrapper">
  <div class="content">
    <div class="d-md-flex d-block align-items-center justify-content-between page-breadcrumb mb-3">
      <div class="my-auto mb-2">
        <h2 class="mb-1">Administration</h2>
        <nav>
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item">
              <a href><i class="ti ti-smart-home"></i></a>
            </li>
            <li routerLink="/app/users" class="breadcrumb-item">Users</li>
            <li class="breadcrumb-item active" aria-current="page">Create</li>
          </ol>
        </nav>
      </div>
    </div>
    <div class="row justify-content-center align-content-center mt-3">
      <div class="col-md-12">
        <div class="card shadow-lg">
          <div class="card-header bg-primary text-white d-flex align-items-center">
            <i class="fas fa-cogs me-2"></i>
            <h5 class="mb-0 text-white">Create User</h5>
          </div>
          <div class="card-body">
            <form class="row g-3" autocomplete="off">
              <div class="col-md-12 mb-3">
                <label class="form-label d-block">User Type <span class="text-danger fw-bold">*</span></label>
               <div class="btn-group" role="group" aria-label="User type">
                  <input type="radio" class="btn-check" name="userType" id="employeeRadio" [(ngModel)]="userType" value="Employee" autocomplete="off">
                  <label class="btn" [ngClass]="{'btn-primary text-white': userType === 'Employee', 'btn-outline-primary text-primary': userType !== 'Employee' }" for="employeeRadio">
                    <i class="ti ti-user"></i> Employee
                  </label>
                  <input type="radio" class="btn-check" name="userType" id="buyerRadio" [(ngModel)]="userType" value="Buyer" autocomplete="off">
                  <label class="btn" [ngClass]="{ 'btn-primary text-white': userType === 'Buyer', 'btn-outline-primary text-primary': userType !== 'Buyer' }" for="buyerRadio">
                    <i class="ti ti-shopping-cart"></i> Buyer
                  </label>
                </div>
              </div>
              <div class="col-md-3">
                <label class="form-label" for="companyId">Company <span class="text-danger fw-bold">*</span></label>
                <select class="js-example-placeholder select2" id="companyId">
                  <option *ngFor="let company of companies" [value]="company.id">{{ company.name }}</option>
                </select>
              </div>
              <div class="col-md-3" [hidden]="userType != 'Employee'">
                <label class="form-label" for="employeeId">Employee</label>
                <select class="js-example-placeholder select2" id="employeeId">
                  <option [value]="-1">Select Employee</option>
                  <option *ngFor="let employee of employees" [value]="employee.id">{{ employee.name }}
                  </option>
                </select>
              </div>
              <div class="col-md-4">
                <label for="fullName" class="form-label">Full Name <span class="text-danger fw-bold">*</span></label>
                <input type="text" id="fullName" name="fullName" [(ngModel)]="userCreateModel.fullName" class="form-control" placeholder="Enter full name" />
              </div>
              <div class="col-md-4">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" [(ngModel)]="userCreateModel.email" class="form-control" />
              </div>
              <div class="col-md-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <input id="password" name="password" [(ngModel)]="userCreateModel.password" value="{{ password }}" class="form-control" 
                    [type]="hide ? 'password' : 'text'" />
                  <span class="input-group-text" (click)="showPassword()">
                    <i [ngClass]="hide ? 'ti ti-eye' : 'ti ti-eye-off'"></i>
                  </span>
                  <span class="btn btn-primary" (click)="onClickGeneratePassword()">Generate</span>
                </div>
              </div>
            </form>
          </div>
          <div class="card-footer">
            <div class="col-12">
              <div class="modal-footer">
                <button type="button" routerLink="/app/users" class="btn btn-light me-2">
                  <i class="ti ti-arrow-back-up me-1"></i>
                  Back
                </button>
                <button type="button" (click)="onClickCreateUser()" class="btn btn-primary" *appCheckPermission="{ feature: 'User', action: 'Create' }">
                  <i class="ti ti-device-floppy me-1"></i>
                  Create
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="medium" color="#fff" type="ball-spin" [fullScreen]="true">
  <p style="color: white">Loading...</p>
</ngx-spinner>
