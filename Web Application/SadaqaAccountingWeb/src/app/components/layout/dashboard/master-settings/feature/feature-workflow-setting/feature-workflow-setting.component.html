<div *ngIf="featureId; else noFeatureSelected">
  <div class="col-md-12">
    <div class="card">
      <div class="card-header d-flex align-items-center">
        <i class="fas fa-cogs me-2"></i>
        <h5 class="mb-0"> Workflow Details</h5>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <!-- <h6 class="mb-3">Workflow Processes</h6> -->
          <div class="row">
            
          </div>
          <!-- <div class="row">
                <div class="col-md-3">
                  <a type="button" routerLink="/app/workflow_process/create"
                  class="btn btn-primary me-2"><i
                    class="ti ti-circle-plus me-1"></i>Create Workflow Proccess</a>
                </div>
          </div> -->
        </div>
      </div>

      <div class="card-footer">
        <div class="col-12">
          <div class="modal-footer">
            <button
              type="button"
              data-bs-toggle="modal"
              data-bs-target="#add_workflowprocess_modal"
              (click)="onClickShowSetupWorkFlowFrom()"
              class="btn btn-primary"
              *appCheckPermission="{ feature: 'WorkFlowProcess', action: 'Create' }">
              <i class="ti ti-settings-plus me-1"></i>
              Setup Workflow
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="add_workflowprocess_modal">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Create Workflow Process</h4>
        <button
          type="button"
          class="btn-close custom-btn-close"
          data-bs-dismiss="modal"
          aria-label="Close">
          <i class="ti ti-x"></i>
        </button>
      </div>
      <form autocomplete="off">
        <div class="modal-body pb-0 mb-5">
          <div class="row">
        
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light me-2" data-bs-dismiss="modal">Cancel</button>
          <button
            type="submit"
            class="btn btn-primary" data-bs-dismiss="modal"
            (click)="handleOkWorkflowProcessCreateModal()">
            Save
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<ng-template #noFeatureSelected>
  <p class="text-center text-muted">Please select a feature to view its details.</p>
</ng-template>

<!-- Spinner -->
<ngx-spinner
  bdColor="rgba(0, 0, 0, 0.8)"
  size="medium"
  color="#fff"
  type="ball-spin"
  [fullScreen]="true">
  <p style="color: white">Loading...</p>
</ngx-spinner>
